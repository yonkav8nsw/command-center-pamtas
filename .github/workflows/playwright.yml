name: E2E Tests

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Create .env file for build (required for Vite)
      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build
        run: npm run build

      # Verify dist folder exists
      - name: Verify build output
        run: |
          echo "=== dist folder contents ===" && ls -la dist/
          echo "=== index.html exists ===" && test -f dist/index.html && echo "YES" || echo "NO"

      # Start preview server with explicit base path
      - name: Start preview server
        run: |
          echo "Starting preview server on port 4173..."
          npx vite preview --port 4173 --base /command-center-pamtas/ &
          PREVIEW_PID=$!
          echo "Preview PID: $PREVIEW_PID"
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:4173/command-center-pamtas/ || echo "Server check failed"

      # Wait for server to be ready
      - name: Wait for server
        run: npx wait-on http://localhost:4173/command-center-pamtas/ --timeout 30000 || echo "Wait timeout - continuing anyway"

      # Debug: verify server is running
      - name: Debug server
        run: |
          echo "=== Checking server ===" && curl -s http://localhost:4173/command-center-pamtas/ | head -c 500
          echo ""
          echo "=== HTTP Status ===" && curl -s -o /dev/null -w "%{http_code}" http://localhost:4173/command-center-pamtas/

      # TEMPORARY: Run only debug test to see actual page state
      - name: Run DEBUG test
        run: npx playwright test e2e/tests/debug.spec.js --reporter=line
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PLAYWRIGHT_BASE_URL: http://localhost:4173/command-center-pamtas/

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
